services:

  step-ca-cli:

    image: ${STEP_TAG}
    hostname: ${STEP_CA_HOSTNAME:-step-ca-cli}
    command: step_ca=renew
    environment:
      TZ:               "${TZ}"
      DOMAIN_NAME:      "${DOMAIN_NAME}"
      STEP_URL:         "${STEP_URL}"
      STEP_FINGERPRINT: "${STEP_FINGERPRINT}"
      USER_DOMAIN_ID:   "${USER_DOMAIN_ID:-1001}"
      GROUP_DOMAIN_ID:  "${GROUP_DOMAIN_ID:-1001}"
      SEND_SIGHUP:      "${SEND_SIGHUP:-0}"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime
      - step_ca_certs:/root/.step/certs
      - step_ca_config:/root/.step/config

volumes:
  step_ca_certs:
    external: true
    name: ${STEP_CA_CERTS_VOL:-step_ca_certs}
  step_ca_config:
    external: true
    name: ${STEP_CA_CONF_VOL:-step_ca_config}
